name: Build and Test Project

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: "22"

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    name: Build, Test, and Coverage
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Cache node_modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
      - name: Install Dependencies
        run: npm install
      - name: Build Project
        run: npm run build
      - name: Run Tests
        run: npm run test
      # Upload Code Coverage (Looks for lcov.info / clover.xml)
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
      # Upload Test Execution Info (Looks for junit.xml)
      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v7
        with:
          use_oidc: true
          report_type: test_results
      - name: Save Build Output
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          retention-days: 7
          path: |
            main.js
            manifest.json
            styles.css
